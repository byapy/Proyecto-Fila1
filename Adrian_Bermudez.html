<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Adrian | Diseño Premium</title>
    <link rel="stylesheet" href="css/adrian.css">
</head>

<body>
    <img src="img/bg.png" alt="Background" class="background-image">

    <div class="profile-card">
        <h1>Mi Perfil Personal</h1>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Concepto</th>
                        <th>Información Detallada</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="label">Cosas que me gustan</td>
                        <td class="value">
                            <span class="tag">Programar</span>
                            <span class="tag">Bailar</span>
                            <span class="tag">Música</span>
                            <span class="tag">Leer</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="label">Edad</td>
                        <td class="value">20 años</td>
                    </tr>
                    <tr>
                        <td class="label">Fecha de cumpleaños</td>
                        <td class="value">17 de mayo</td>
                    </tr>
                    <tr>
                        <td class="label">Estudios</td>
                        <td class="value">Desarrollo fulstack</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
